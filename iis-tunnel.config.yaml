# IIS-Tunnel Configuration File
# ==============================
# Each profile is completely self-contained.
# No default values - everything must be defined in each profile.
# Use: iis-tunnel --profile <name> --deploy

profiles:
  itescola:
    description: "Deployment profile for ITE School"
    password: "ferrantpvescola"
    source:
      path: C:\temp\demo
      files:           # Loose files directly in C:\temp\demo (no subfolder)
        - Global.asax
        - Web.config
      folders:
        - bin:  # Copy specific files from bin folder
            - demoapp.dll
            - demoapp.xml
        - itescola
        - js:
            - ITGlobalResources.html
      
    staging:
      type: ssh
      path: C:\webs\t_itescola
      ssh:
        host: 85.215.220.180
        port: 22
        username: deployuser
        privateKey: C:\Users\fsanc\.ssh\tpvescola_deploy_new
    destination:
      type: ssh
      path: C:\webs\ITEscolaApp
      ssh:
        host: 85.215.220.180
        port: 22
        username: deployuser
        privateKey: C:\Users\fsanc\.ssh\tpvescola_deploy_new
    backup:
      path: C:\webs\backups_t_itescola
      maxBackups: 5
    logging:
      path: C:\webs\t_Itescola
      filename: itescola-deploy
